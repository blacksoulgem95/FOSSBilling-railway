# Requires GITHUB_TOKEN to open PRs. Configure the repository (and org, if applicable):
#
# Repository: Settings → Actions → General
#   - Workflow permissions: "Read and write permissions"
#   - Enable: "Allow GitHub Actions to create and approve pull requests"
#
# Organization (if the repo is under an org): Org Settings → Actions → General
#   - Allow the same workflow permissions / PR creation policy for member repositories.
name: Pin Docker base image digests

on:
  schedule:
    # Mondays 07:00 UTC
    - cron: "0 7 * * 1"
  # Manual: repo → Actions → this workflow → "Run workflow"
  workflow_dispatch:
    inputs:
      note:
        description: "Optional note for this run (logged in the job output)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

jobs:
  pin-digests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Manual run metadata
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Triggered manually by ${GITHUB_ACTOR}"
          echo "Note: ${{ inputs.note }}"

      - uses: docker/setup-buildx-action@v3

      - name: Pin image digests in Dockerfile
        run: |
          chmod +x ./fix-version.sh
          ./fix-version.sh Dockerfile

      - name: Check if Dockerfile changed
        id: dockerfile
        run: |
          if git diff --quiet -- Dockerfile; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No digest changes; skipping pull request."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Dockerfile changed; will open or update pull request."
            git diff -- Dockerfile
          fi

      - name: Create pull request
        if: steps.dockerfile.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(docker): pin base image digests"
          title: "chore(docker): pin base image digests"
          body: |
            Weekly (or manual) update of `FROM` lines to `image:tag@sha256:…` via `fix-version.sh`.

            Review the digest changes and merge when ready.
          branch: chore/docker-digest-pins
          delete-branch: true
